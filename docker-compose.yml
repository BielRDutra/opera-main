version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: opera_db
    restart: always
    ports:
      # map host 3307 to container 3306 (MySQL default)
      - "3307:3306"
    environment:
      MYSQL_DATABASE: opera_latam
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: operadora
      MYSQL_PASSWORD: operadora
    volumes:
      - ./.docker/dbdata:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    